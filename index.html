<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voclaire - Transcription audio par IA</title>
    <style>
      html, body { background: #030712; margin: 0; }
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #root:empty::after {
        content: "";
        width: 40px;
        height: 40px;
        border: 3px solid rgba(16, 185, 129, 0.25);
        border-top-color: #10b981;
        border-radius: 50%;
        animation: vc-boot-spin 0.8s linear infinite;
      }
      @keyframes vc-boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <meta
      name="description"
      content="Transcrivez vos réunions, enregistrements et fichiers audio en texte avec Voclaire. Propulsé par Whisper. Gratuit jusqu'à 60 min/mois. Export DOCX, PDF, PowerPoint."
    />
    <link rel="canonical" href="https://voclaire.fr/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://voclaire.fr/" />
    <meta
      property="og:title"
      content="Voclaire - Transcription audio par IA"
    />
    <meta
      property="og:description"
      content="Transcrivez vos réunions, enregistrements et fichiers audio en texte avec Voclaire. Propulsé par Whisper. Gratuit jusqu'à 60 min/mois. Export DOCX, PDF, PowerPoint."
    />
    <meta property="og:image" content="https://voclaire.fr/og-image.png" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Voclaire" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Voclaire - Transcription audio par IA"
    />
    <meta
      name="twitter:description"
      content="Transcrivez vos réunions, enregistrements et fichiers audio en texte avec Voclaire. Propulsé par Whisper. Gratuit jusqu'à 60 min/mois. Export DOCX, PDF, PowerPoint."
    />
    <meta name="twitter:image" content="https://voclaire.fr/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Voclaire",
        "description": "Application de transcription audio par IA. Convertissez vos réunions, enregistrements et fichiers audio en texte avec le modèle Whisper d'OpenAI.",
        "url": "https://voclaire.fr",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "inLanguage": "fr",
        "offers": [
          {
            "@type": "Offer",
            "name": "Free",
            "price": "0",
            "priceCurrency": "EUR",
            "description": "60 min de transcription par mois, 10 améliorations LLM, export DOCX"
          },
          {
            "@type": "Offer",
            "name": "Pro",
            "price": "9.99",
            "priceCurrency": "EUR",
            "description": "Transcription illimitée, export DOCX/PDF/PPTX structurés, modèle Whisper fine-tuné français"
          }
        ]
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Voclaire est-il gratuit ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Oui, Voclaire propose un plan gratuit permanent sans carte bancaire. Le plan Free inclut 60 minutes de transcription par mois, 10 améliorations LLM et l'export en DOCX. Le plan Pro à 9,99 €/mois (ou 7,99 €/mois en annuel) offre la transcription illimitée et l'export structuré en Word, PDF et PowerPoint."
            }
          },
          {
            "@type": "Question",
            "name": "Comment transcrire une réunion Google Meet, Teams ou Zoom avec Voclaire ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Connectez-vous sur voclaire.fr, accédez à la section 'Enregistrer une réunion' dans l'application. Cliquez sur 'Démarrer l'enregistrement' et sélectionnez l'onglet de votre réunion. Voclaire capture l'audio de tous les participants. Une fois la réunion terminée, cliquez sur 'Transcrire maintenant'."
            }
          },
          {
            "@type": "Question",
            "name": "Quels formats audio Voclaire supporte-t-il ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Voclaire accepte les formats MP3, WAV, M4A, OGG et FLAC. En plan Free, la durée maximale d'un fichier est de 30 minutes. En plan Pro, les fichiers peuvent aller jusqu'à 3 heures."
            }
          },
          {
            "@type": "Question",
            "name": "Quelle est la précision de la transcription de Voclaire ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Voclaire utilise Whisper large-v3-turbo, le modèle de transcription d'OpenAI reconnu pour sa haute précision sur le français. Le plan Pro utilise une version fine-tunée sur des données françaises pour une précision encore supérieure sur les accents et le vocabulaire technique."
            }
          },
          {
            "@type": "Question",
            "name": "Peut-on exporter la transcription en Word, PDF ou PowerPoint ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "En plan Free, l'export est disponible en DOCX (texte brut). En plan Pro, Voclaire génère automatiquement des documents structurés exportables en Word (.docx), PDF et PowerPoint (.pptx) avec une mise en forme professionnelle."
            }
          },
          {
            "@type": "Question",
            "name": "Voclaire respecte-t-il le RGPD ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Oui, Voclaire est conforme au RGPD. Les données audio sont traitées de manière sécurisée et ne sont pas revendues à des tiers. Vous pouvez supprimer vos transcriptions à tout moment depuis votre espace personnel. L'éditeur est Nasser MOHAMED SAID, SIRET 90310857900025, basé en France."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
